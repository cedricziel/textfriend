name: TextFriend
options:
  bundleIdPrefix: com.cedricziel
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  TextFriend:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.textfriend
        MARKETING_VERSION: "1.3.0" # x-release-please-version
        CURRENT_PROJECT_VERSION: 1
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        DEVELOPMENT_TEAM: WPW3QSLZ2F
        # Manual signing pinned to the match-managed profiles. Without
        # these, xcodebuild archive (run by gym) errors with "Automatic
        # signing is disabled and unable to generate a profile" because
        # match in readonly mode doesn't write to project.pbxproj and
        # xcodegen regenerates the project on every CI run.
        CODE_SIGN_STYLE: Manual
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: "match Development com.cedricziel.textfriend"
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.cedricziel.textfriend"
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: TextFriend
        # Reference build settings so release-please's MARKETING_VERSION and
        # the commit-count CURRENT_PROJECT_VERSION reach the binary; without
        # these xcodegen hard-codes 1.0/1 and every upload is "build 1".
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportsDocumentBrowser: true
        LSSupportsOpeningDocumentsInPlace: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: Text Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
              - public.text
              - public.yaml
              - public.json
              - public.xml
              - public.shell-script
              - public.comma-separated-values-text
              - net.daringfireball.markdown
              - org.toml.toml
              - com.cedricziel.textfriend.ini
              - com.cedricziel.textfriend.env
              - com.cedricziel.textfriend.hcl
              - com.cedricziel.textfriend.sql
              - com.cedricziel.textfriend.patch
              - com.cedricziel.textfriend.log
              - com.cedricziel.textfriend.strings
              - public.tab-separated-values-text
          # Generic fallback so explicitly-shared files of any type can be
          # opened as text (kept in a separate, lowest-rank declaration).
          - CFBundleTypeName: Any File
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
            LSItemContentTypes:
              - public.data
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [md, markdown, mdown]
          - UTTypeIdentifier: org.toml.toml
            UTTypeDescription: TOML Document
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [toml]
          - UTTypeIdentifier: com.cedricziel.textfriend.ini
            UTTypeDescription: INI Configuration File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [ini, cfg, conf, properties, editorconfig]
          - UTTypeIdentifier: com.cedricziel.textfriend.env
            UTTypeDescription: Environment File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [env]
          - UTTypeIdentifier: com.cedricziel.textfriend.hcl
            UTTypeDescription: HCL / Terraform File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [tf, tfvars, hcl]
          - UTTypeIdentifier: com.cedricziel.textfriend.sql
            UTTypeDescription: SQL Script
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [sql]
          - UTTypeIdentifier: com.cedricziel.textfriend.patch
            UTTypeDescription: Diff / Patch File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [diff, patch]
          - UTTypeIdentifier: com.cedricziel.textfriend.log
            UTTypeDescription: Log File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [log]
          - UTTypeIdentifier: com.cedricziel.textfriend.strings
            UTTypeDescription: Strings Localization File
            UTTypeConformsTo: [public.plain-text]
            UTTypeTagSpecification:
              public.filename-extension: [strings]

  TextFriendTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/TextFriendTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.textfriend.tests
    dependencies:
      - target: TextFriend

  TextFriendUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/TextFriendUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cedricziel.textfriend.uitests
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
    dependencies:
      - target: TextFriend

schemes:
  TextFriend:
    build:
      targets:
        TextFriend: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - TextFriendTests
        - name: TextFriendUITests
          # Screenshot generation is driven by fastlane, not the test run.
          skippedTests:
            - ScreenshotTests
